app:
  title: Wedge Field Billiard Explorer
  theme: light
  log_level: INFO
simulation:
  alpha: 0.6610687244040299
  beta: 1.0100816886225412
  n_phase_default: 100
  n_geom_default: 25
  eps: 1.0e-09
replay:
  delay_ms: 120
  selected_only_by_default: true
background:
  build_chunk_size: 16
  fast_build: true
debug:
  performance_trace: true
lyapunov:
  delta0: 1.0e-06
  transient_steps: 10
  max_steps: 200
  renormalization_interval: 1
  eps: 1.0e-12
export:
  dpi: 200
  default_mode: color
  monochrome_line_styles:
  - solid
  - dashed
  - dotted
  - dashdot
view:
  show_phase_grid: true
  show_phase_minor_grid: false
  show_seed_markers: true
  show_stationary_point: true
  phase_grid:
    major_step_d: 0.1
    major_step_tau: 0.1
    minor_step_d: 0.05
    minor_step_tau: 0.05
    show_minor: false
    major_color: '#cccccc'
    minor_color: '#e6e6e6'
    major_width: 1.0
    minor_width: 0.6
    major_alpha: 0.8
    minor_alpha: 0.5
    major_style: solid
    minor_style: dotted
  show_labels: true
  show_directrix: true
  show_reflection_points: true
  show_regions: true
  show_region_labels: true
  show_labels_on_plot: false
  plot_label_mode: legend
  tooltip_label_mode: legend
  show_region_legend: true
  show_branch_markers: true
  active_angle_constraint: null
  phase_point_radius: 2
  geometry_point_radius: 2
  angle_hover_tooltip: true
window:
  width: 2536
  height: 1539
  x: 0
  y: 27
autosave:
  enabled: true
  path: autosave/session.yaml
  restore_simulation_parameters: true
regions:
- name: n3_boundary
  type: boundary
  display_text: B
  legend_text: 3*sin(α-2*β) - sin(3*α-2*β) = 0
  expression: 3*sin(α-2*β) - sin(3*α-2*β)
  priority: 30
  visible: true
  style:
    fill: '#ffffff'
    alpha: 0.0
    hatch: ''
    border: '#17becf'
    line_style: solid
    line_width: 1.5
- name: n3_boundary_copy
  type: boundary
  display_text: N4
  legend_text: 3*sin(α-2*β) - sin(3*α-2*β) = 0
  expression: -(3*sin(α-2*β) - sin(3*α-2*β))*(3*sin(2*α-β) - sin(2*α-3*β))/(8*sin(α)*sin(β))
    - 1
  priority: 30
  visible: true
  style:
    fill: '#ffffff'
    alpha: 0.0
    hatch: ''
    border: '#17becf'
    line_style: solid
    line_width: 1.5
native:
  enabled: true
  sample_mode: dense
  sample_step: 20
